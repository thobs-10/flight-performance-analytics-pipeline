version: 2

sources:
  - name: bronze
    schema: bronze
    description: Raw ingested airline delay data from the bronze layer.
    tables:
      - name: airline_delay_data
        description: >
          Raw airline on-time performance and delay cause data ingested from the
          BTS CSV source. One row per carrier-airport-month combination.
        columns:
          - name: year
            description: Reporting year.
          - name: month
            description: Reporting month (1–12).
          - name: carrier
            description: IATA carrier code.
          - name: carrier_name
            description: Full carrier name.
          - name: airport
            description: IATA airport code.
          - name: airport_name
            description: Full airport name.
          - name: arr_flights
            description: Total arriving flights.
          - name: arr_del15
            description: Flights delayed 15 minutes or more.
          - name: carrier_ct
            description: Carrier-caused delay count (weighted).
          - name: weather_ct
            description: Weather-caused delay count (weighted).
          - name: nas_ct
            description: NAS-caused delay count (weighted).
          - name: security_ct
            description: Security-caused delay count (weighted).
          - name: late_aircraft_ct
            description: Late-aircraft-caused delay count (weighted).
          - name: arr_cancelled
            description: Number of cancelled flights.
          - name: arr_diverted
            description: Number of diverted flights.
          - name: arr_delay
            description: Total arrival delay minutes.
          - name: carrier_delay
            description: Carrier-caused delay minutes.
          - name: weather_delay
            description: Weather-caused delay minutes.
          - name: nas_delay
            description: NAS-caused delay minutes.
          - name: security_delay
            description: Security-caused delay minutes.
          - name: late_aircraft_delay
            description: Late-aircraft-caused delay minutes.
          - name: _ingested_at
            description: UTC timestamp when this row was ingested into the bronze layer.
